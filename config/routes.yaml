# Mock WMS — бизнес-правила маршрутизации (не ML).
# Полное описание: docs/BUSINESS_RULES.md
#
# ЦЕПОЧКА НА ПРОДЕ (один процесс, не два источника):
#   1. Скан штрихкода (pyzbar / скан-портал)
#   2. WMS lookup: код → cluster заказа (moscow, siberia, …)
#   3. Справочник хаба: cluster → физический рукав (chute_*)
#
# В ЭТОМ YAML:
#   - by_barcode_prefix — УПРОЩЕНИЕ демо: шаги 2+3 сразу (код → рукав)
#   - by_cluster       — ПОЛНАЯ таблица шага 3 (когда WMS отдаёт cluster отдельно)
#   - Обе секции должны быть СОГЛАСОВАНЫ (461… ≈ moscow → chute_b)
#
# Кластер НЕ снимается с камеры и НЕ от YOLO — только из WMS после штрихкода.
# CV-класс (box, sphere) — тип упаковки; fallback маршрута при No Read.

default_zone: zone_reject

# --- Шаг 2+3 схлопнуты: префикс EAN → рукав (mock WMS lookup по коду) ---
by_barcode_prefix:
  "460": chute_a   # эквивалент: cluster siberia → chute_a
  "461": chute_b   # эквивалент: cluster moscow → chute_b
  "462": chute_c   # эквивалент: cluster south → chute_c

# --- Шаг 3 отдельно: кластер из ответа WMS (после lookup по штрихкоду) ---
# В рантайме: resolve(cluster=…) — когда подключим mock API WMS (сейчас не вызывается).
by_cluster:
  siberia: chute_a
  moscow: chute_b
  south: chute_c

# --- FALLBACK: CV-класс → рукав только при отсутствии штрихкода ---
by_class:
  box: chute_a
  sphere: chute_b
  bag: chute_c

zones:
  chute_a:
    label: "Рукав A — кластер Сибирь (направление, не тип товара)"
    actuator: cross-belt
    direction: left
  chute_b:
    label: "Рукав B — кластер Москва (направление, не тип товара)"
    actuator: cross-belt
    direction: right
  chute_c:
    label: "Рукав C — кластер Юг"
    actuator: pop-up
    direction: right
  zone_reject:
    label: "No Read / ручная выбраковка"
    actuator: cross-belt
    direction: left
